services:
  - type: web
    name: ucs-mitra
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: ucs-updates-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PRIMARY_EMAIL
        value: gandlasandya@gmail.com
      - key: ALTERNATE_EMAIL
        value: ucsmitra@gmail.com
      - key: WHATSAPP_NUMBER
        value: "919912463921"
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: UPLOAD_DIR
        value: /opt/render/project/src/data/uploads
      - key: UPDATE_UPLOAD_LIMIT_MB
        value: "80"
